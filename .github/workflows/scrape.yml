name: Scrape prices

on:
  schedule:
    # GitHub cron is UTC. AEST = UTC+10 (add 1h shift during AEDT, Oct–Apr).
    - cron: '5 7 * * 1'   # Monday ~5:05pm AEST — catalogue day snapshot
    - cron: '5 22 * * 2'  # Wednesday ~8:05am AEST — new specials live
  workflow_dispatch: {}   # lets the app's Refresh button trigger a run

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + real Chrome
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
          npx playwright install chrome || echo "Chrome install failed — will fall back to Chromium"

      - name: Scrape prices (headful under xvfb)
        run: xvfb-run --auto-servernum node scraper/scrape.js

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit prices.json
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/prices.json
          if git diff --cached --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "Prices $(TZ=Australia/Sydney date +'%Y-%m-%d %H:%M AEST')"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            git push
          fi
